<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenTelemetry Operator 在整个观测架构中的位置</title>
  <meta name="description" content="用极少文字和动态图，展示 OpenTelemetry Operator 在整个观测架构中的位置，以及控制流与数据流。" />
  <style>
    :root {
      --bg: #07111d; --text: #f3f8ff; --muted: #8ea8c8; --cyan: #74e6ff; --border: rgba(136,186,255,.16); --shadow: 0 24px 80px rgba(0,0,0,.34); --max: 1320px;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0; color: var(--text); font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at 10% 0%, rgba(116,230,255,.12), transparent 28%), radial-gradient(circle at 100% 8%, rgba(164,147,255,.12), transparent 24%), linear-gradient(180deg, #07111d 0%, #0a1424 35%, #08111d 100%);
    }
    body::before {
      content: ""; position: fixed; inset: 0; pointer-events: none;
      background-image: linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
      background-size: 40px 40px; mask-image: linear-gradient(180deg, rgba(255,255,255,.5), transparent 92%);
    }
    img { display:block; max-width:100%; }
    a { color: inherit; text-decoration: none; }
    .wrap { width:min(var(--max), calc(100% - 36px)); margin:0 auto; }
    .nav { position: sticky; top:0; z-index:40; backdrop-filter: blur(18px); background: rgba(7,17,29,.72); border-bottom:1px solid rgba(255,255,255,.06); }
    .nav-inner { display:flex; justify-content:space-between; align-items:center; gap:18px; padding:14px 0; }
    .brand { display:flex; align-items:center; gap:12px; font-weight:800; letter-spacing:.02em; }
    .brand-mark { width:38px; height:38px; border-radius:14px; position:relative; background: linear-gradient(135deg, #74e6ff, #58b3ff); box-shadow: 0 12px 28px rgba(116,230,255,.24); }
    .brand-mark::before, .brand-mark::after { content:""; position:absolute; inset:8px; border:2px solid rgba(255,255,255,.92); border-radius:10px; }
    .brand-mark::after { inset:14px; border-radius:7px; border-color:rgba(255,255,255,.64); }
    .nav-links { display:flex; gap:18px; flex-wrap:wrap; color:var(--muted); font-size:14px; }
    .poster { padding: 58px 0 26px; }
    .kicker { margin-bottom:16px; color:var(--cyan); font-size:14px; font-weight:800; letter-spacing:.24em; text-transform:uppercase; }
    .title { margin:0; max-width:1120px; font-size: clamp(56px, 8vw, 116px); line-height:.9; letter-spacing:-.06em; text-wrap:balance; }
    .thesis { margin:18px 0 0; max-width:900px; color:var(--muted); font-size: clamp(18px, 2vw, 24px); line-height:1.15; text-wrap:balance; }
    .visual { margin-top:28px; padding:14px; border-radius:30px; overflow:hidden; background: linear-gradient(180deg, rgba(12,22,38,.92), rgba(8,14,25,.96)); border:1px solid var(--border); box-shadow:var(--shadow); }
    .footer { padding: 20px 0 60px; color: var(--muted); font-size:14px; }
    .footer a { color: var(--cyan); font-weight:700; }
    @media (max-width: 960px) { .nav-inner { flex-direction:column; align-items:flex-start; } }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="wrap nav-inner">
      <div class="brand"><span class="brand-mark" aria-hidden="true"></span><span>OpenTelemetry Operator</span></div>
      <div class="nav-links"><a href="#position">位置</a><a href="#loop">循环</a><a href="DEMO_SCRIPT.md">演讲稿</a></div>
    </div>
  </nav>

  <header class="poster" id="position">
    <div class="wrap">
      <div class="kicker">POSITION</div>
      <h1 class="title">它站在中间。<br>管接入，不搬数据。</h1>
      <p class="thesis">左边业务流，右边导出流，中间控制流。</p>
      <div class="visual"><img src="assets/architecture-stage.svg" alt="OpenTelemetry Operator 在应用、Collector、后端之间的位置，以及业务流、控制流、导出流的动态图" /></div>
    </div>
  </header>

  <section class="poster" id="loop">
    <div class="wrap">
      <div class="kicker">CONTROL LOOP</div>
      <h2 class="title">监听。改写。生成。校正。</h2>
      <div class="visual"><img src="assets/operator-loop-stage.svg" alt="OpenTelemetry Operator 的控制循环动态图，展示监听、改写、生成、校正持续循环" /></div>
    </div>
  </section>

  <footer class="footer">
    <div class="wrap">10 分钟演讲稿：<a href="DEMO_SCRIPT.md">DEMO_SCRIPT.md</a></div>
  </footer>
</body>
</html>
