<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenTelemetry Operator 在整个观测架构中的位置</title>
  <meta name="description" content="用更克制的版式和动态图，展示 OpenTelemetry Operator 的位置与控制循环。" />
  <style>
    :root {
      --bg:#07111d; --text:#f3f8ff; --muted:#93abca; --cyan:#74e6ff; --border:rgba(136,186,255,.16); --shadow:0 20px 70px rgba(0,0,0,.32); --max:1280px;
    }
    *{box-sizing:border-box}
    body{
      margin:0; color:var(--text); font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:radial-gradient(circle at 10% 0%, rgba(116,230,255,.10), transparent 28%),radial-gradient(circle at 100% 8%, rgba(164,147,255,.10), transparent 24%),linear-gradient(180deg,#07111d 0%,#0a1424 35%,#08111d 100%);
    }
    body::before{
      content:""; position:fixed; inset:0; pointer-events:none;
      background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);
      background-size:40px 40px; mask-image:linear-gradient(180deg,rgba(255,255,255,.42),transparent 92%);
    }
    img{display:block;max-width:100%}
    .wrap{width:min(var(--max),calc(100% - 40px));margin:0 auto}
    .hero{padding:42px 0 24px}
    .brand{display:flex;align-items:center;gap:12px;color:#dff8ff;font-weight:760;letter-spacing:.02em;font-size:18px}
    .brand-mark{width:34px;height:34px;border-radius:12px;position:relative;background:linear-gradient(135deg,#74e6ff,#58b3ff);box-shadow:0 10px 24px rgba(116,230,255,.24)}
    .brand-mark::before,.brand-mark::after{content:"";position:absolute;inset:7px;border:2px solid rgba(255,255,255,.92);border-radius:9px}
    .brand-mark::after{inset:13px;border-radius:6px;border-color:rgba(255,255,255,.62)}
    .kicker{margin:34px 0 12px;color:var(--cyan);font-size:13px;font-weight:800;letter-spacing:.24em;text-transform:uppercase}
    .title{margin:0;max-width:820px;font-size:clamp(30px,3.8vw,54px);line-height:1.06;letter-spacing:-.04em;text-wrap:balance;font-weight:780}
    .thesis{margin:12px 0 0;max-width:680px;color:var(--muted);font-size:clamp(15px,1.45vw,19px);line-height:1.3}
    .section{padding:20px 0 12px}
    .visual{margin-top:22px;padding:12px;border-radius:28px;overflow:hidden;background:linear-gradient(180deg,rgba(12,22,38,.92),rgba(8,14,25,.96));border:1px solid var(--border);box-shadow:var(--shadow)}
    .spacer{height:10px}
    @media (max-width: 900px){.hero{padding-top:30px}.title{max-width:none}}
  </style>
</head>
<body>
  <header class="hero">
    <div class="wrap">
      <div class="brand"><span class="brand-mark" aria-hidden="true"></span><span>OpenTelemetry Operator</span></div>
    </div>
  </header>

  <section class="section">
    <div class="wrap">
      <div class="kicker">Position</div>
      <h1 class="title">它在中间。<br>负责控制接入。</h1>
      <p class="thesis">左边是应用，下面是 Collector，右边是后端。</p>
      <div class="visual"><img src="assets/architecture-stage.svg" alt="OpenTelemetry Operator 在应用、Collector、后端之间的位置，以及业务流、控制流、导出流的动态图" /></div>
    </div>
  </section>

  <div class="spacer"></div>

  <section class="section">
    <div class="wrap">
      <div class="kicker">Loop</div>
      <h2 class="title">监听。生成。改写。校正。</h2>
      <div class="visual"><img src="assets/operator-loop-stage.svg" alt="OpenTelemetry Operator 的控制循环动态图，展示监听、生成、改写、校正持续循环" /></div>
    </div>
  </section>
</body>
</html>
