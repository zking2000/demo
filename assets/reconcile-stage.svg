<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Reconcile Loop 大图</title>
  <desc id="desc">通过一个巨大的环形流程展示监听、计算、生成与校正的闭环。</desc>
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="1480" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1730"/>
      <stop offset="1" stop-color="#070E18"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="28" flood-color="#000814" flood-opacity="0.45"/>
    </filter>
    <style>
      .h{fill:#EEF5FF;font:800 40px Inter,Arial,sans-serif}
      .t{fill:#F2F7FF;font:800 28px Inter,Arial,sans-serif}
      .d{fill:#D7E6F7;font:500 20px Inter,Arial,sans-serif}
      .k{fill:#CDEBFF;font:700 14px Inter,Arial,sans-serif;letter-spacing:.08em}
    </style>
  </defs>
  <rect width="1600" height="980" rx="40" fill="url(#bg)"/>
  <text x="88" y="114" class="h">实现原理就是一个不停旋转的 reconcile loop</text>
  <text x="88" y="154" class="d">不是执行一次就结束，而是一直盯着期望状态和真实状态是否一致</text>

  <circle cx="800" cy="520" r="286" stroke="#27486A" stroke-width="60" opacity="0.28"/>
  <circle cx="800" cy="520" r="286" stroke="#6CE5FF" stroke-width="8" stroke-dasharray="12 18" opacity="0.7">
    <animateTransform attributeName="transform" type="rotate" from="0 800 520" to="360 800 520" dur="18s" repeatCount="indefinite"/>
  </circle>

  <g filter="url(#shadow)">
    <rect x="644" y="116" width="312" height="170" rx="30" fill="#10213A" stroke="#2E597F" stroke-width="2.5"/>
    <text x="682" y="164" class="k">STEP 1</text>
    <text x="682" y="224" class="t">监听</text>
    <text x="682" y="258" class="d">watch CRD / Pod / 资源状态</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1148" y="364" width="312" height="170" rx="30" fill="#112038" stroke="#4A63A7" stroke-width="2.5"/>
    <text x="1186" y="412" class="k">STEP 2</text>
    <text x="1186" y="472" class="t">计算</text>
    <text x="1186" y="506" class="d">读取 spec.mode / spec.config</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="644" y="754" width="312" height="170" rx="30" fill="#102038" stroke="#317E7B" stroke-width="2.5"/>
    <text x="682" y="802" class="k">STEP 3</text>
    <text x="682" y="862" class="t">生成</text>
    <text x="682" y="896" class="d">Deployment / Service / ConfigMap</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="140" y="364" width="312" height="170" rx="30" fill="#111F37" stroke="#5B59B5" stroke-width="2.5"/>
    <text x="178" y="412" class="k">STEP 4</text>
    <text x="178" y="472" class="t">校正</text>
    <text x="178" y="506" class="d">发现偏差就继续 reconcile</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="590" y="430" width="420" height="180" rx="34" fill="#0E2038" stroke="#3A73A3" stroke-width="2.5"/>
    <text x="638" y="492" class="k">CORE IDEA</text>
    <text x="638" y="556" class="t">让现实状态</text>
    <text x="638" y="594" class="t">不断靠近期望状态</text>
  </g>

  <circle cx="0" cy="0" r="12" fill="#FFFFFF">
    <animateMotion dur="6s" repeatCount="indefinite" path="M800 234 A286 286 0 1 1 799 234"/>
  </circle>
</svg>