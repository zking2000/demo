<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">OpenTelemetry Operator 运行组件图</title>
  <desc id="desc">展示 Operator 运行时的核心组件、依赖与被管理对象。</desc>
  <defs>
    <linearGradient id="bg" x1="120" y1="40" x2="1050" y2="730" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0C1930"/>
      <stop offset="1" stop-color="#09111E"/>
    </linearGradient>
    <linearGradient id="line" x1="140" y1="380" x2="1060" y2="380" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6CE5FF"/>
      <stop offset="1" stop-color="#8B84FF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000714" flood-opacity="0.36"/>
    </filter>
  </defs>
  <rect width="1200" height="760" rx="36" fill="url(#bg)"/>
  <text x="78" y="98" fill="#F1F7FF" font-family="Inter,Arial,sans-serif" font-size="34" font-weight="800">Operator 运行时由哪些组件组成？</text>
  <text x="78" y="138" fill="#A8BBD8" font-family="Inter,Arial,sans-serif" font-size="20">把它想成一个“控制平面 + 被管理工作负载 + 自动注入能力”的组合</text>

  <path d="M140 380H1060" stroke="url(#line)" stroke-width="4" stroke-linecap="round" opacity="0.8"/>

  <g filter="url(#shadow)">
    <rect x="90" y="232" width="190" height="300" rx="28" fill="#10223B" stroke="#2D557D"/>
    <text x="128" y="278" fill="#C7F7FF" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="700">控制平面</text>
    <text x="128" y="326" fill="#F1F7FF" font-family="Inter,Arial,sans-serif" font-size="28" font-weight="800">Controller</text>
    <text x="128" y="360" fill="#F1F7FF" font-family="Inter,Arial,sans-serif" font-size="28" font-weight="800">Manager</text>
    <text x="128" y="412" fill="#D8E7F8" font-family="Inter,Arial,sans-serif" font-size="18">监听 CRD 变化</text>
    <text x="128" y="442" fill="#D8E7F8" font-family="Inter,Arial,sans-serif" font-size="18">执行 reconcile</text>
    <text x="128" y="472" fill="#D8E7F8" font-family="Inter,Arial,sans-serif" font-size="18">创建/更新资源</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="316" y="172" width="250" height="420" rx="28" fill="#112139" stroke="#375A86"/>
    <text x="356" y="218" fill="#D9ECFF" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="700">变更入口</text>
    <text x="356" y="266" fill="#F1F7FF" font-family="Inter,Arial,sans-serif" font-size="28" font-weight="800">Admission</text>
    <text x="356" y="300" fill="#F1F7FF" font-family="Inter,Arial,sans-serif" font-size="28" font-weight="800">Webhook</text>
    <text x="356" y="352" fill="#D8E7F8" font-family="Inter,Arial,sans-serif" font-size="18">拦截带注解的 Pod</text>
    <text x="356" y="382" fill="#D8E7F8" font-family="Inter,Arial,sans-serif" font-size="18">补充 sidecar / initContainer</text>
    <text x="356" y="412" fill="#D8E7F8" font-family="Inter,Arial,sans-serif" font-size="18">注入环境变量与探针配置</text>
    <text x="356" y="472" fill="#9FD7E7" font-family="Inter,Arial,sans-serif" font-size="16">通常依赖证书</text>
    <text x="356" y="500" fill="#9FD7E7" font-family="Inter,Arial,sans-serif" font-size="16">因此常与 cert-manager 配合</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="602" y="172" width="248" height="420" rx="28" fill="#112038" stroke="#3B5B89"/>
    <text x="640" y="218" fill="#CDEBFF" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="700">被管理工作负载</text>
    <text x="640" y="266" fill="#F1F7FF" font-family="Inter,Arial,sans-serif" font-size="28" font-weight="800">Collector /</text>
    <text x="640" y="300" fill="#F1F7FF" font-family="Inter,Arial,sans-serif" font-size="28" font-weight="800">TargetAllocator</text>
    <text x="640" y="352" fill="#D8E7F8" font-family="Inter,Arial,sans-serif" font-size="18">Deployment / DaemonSet /</text>
    <text x="640" y="380" fill="#D8E7F8" font-family="Inter,Arial,sans-serif" font-size="18">StatefulSet / Sidecar</text>
    <text x="640" y="432" fill="#D8E7F8" font-family="Inter,Arial,sans-serif" font-size="18">真正负责接收、处理、转发数据</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="886" y="232" width="220" height="300" rx="28" fill="#111F37" stroke="#4B5398"/>
    <text x="926" y="278" fill="#E6DEFF" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="700">后端与外部</text>
    <text x="926" y="326" fill="#F1F7FF" font-family="Inter,Arial,sans-serif" font-size="28" font-weight="800">Backends</text>
    <text x="926" y="378" fill="#D8E7F8" font-family="Inter,Arial,sans-serif" font-size="18">Jaeger</text>
    <text x="926" y="408" fill="#D8E7F8" font-family="Inter,Arial,sans-serif" font-size="18">Tempo</text>
    <text x="926" y="438" fill="#D8E7F8" font-family="Inter,Arial,sans-serif" font-size="18">Prometheus / APM</text>
  </g>

  <circle cx="280" cy="380" r="10" fill="#6CE5FF"/>
  <circle cx="566" cy="380" r="10" fill="#7BB7FF"/>
  <circle cx="850" cy="380" r="10" fill="#9B91FF"/>
</svg>
