<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Operator 管理的资源组大图</title>
  <desc id="desc">四个大块展示 OpenTelemetryCollector、Instrumentation、TargetAllocator 和 OpAMPBridge。</desc>
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="1480" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1730"/>
      <stop offset="1" stop-color="#070E18"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="28" flood-color="#000814" flood-opacity="0.45"/>
    </filter>
    <style>
      .h{fill:#EEF5FF;font:800 40px Inter,Arial,sans-serif}
      .t{fill:#CDEBFF;font:700 16px Inter,Arial,sans-serif;letter-spacing:.09em}
      .n{fill:#F2F7FF;font:800 32px Inter,Arial,sans-serif}
      .d{fill:#D7E6F7;font:500 22px Inter,Arial,sans-serif}
    </style>
  </defs>
  <rect width="1600" height="980" rx="40" fill="url(#bg)"/>
  <text x="88" y="114" class="h">Operator 主要管理 4 组资源</text>
  <text x="88" y="154" class="d">你只要记住：采集器、自动注入、目标分配、远程桥接</text>

  <g filter="url(#shadow)">
    <rect x="88" y="232" width="670" height="270" rx="34" fill="#10213A" stroke="#2E597F" stroke-width="2.5"/>
    <text x="132" y="286" class="t">V1BETA1 · CORE</text>
    <text x="132" y="350" class="n">OpenTelemetryCollector</text>
    <text x="132" y="408" class="d">声明 Collector 的模式、端口、pipeline 与副本数</text>
    <text x="132" y="454" class="d">deployment / daemonset / statefulset / sidecar</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="842" y="232" width="670" height="270" rx="34" fill="#112038" stroke="#4A63A7" stroke-width="2.5"/>
    <text x="886" y="286" class="t">V1ALPHA1 · INJECTION</text>
    <text x="886" y="350" class="n">Instrumentation</text>
    <text x="886" y="408" class="d">定义自动注入探针时用什么语言配置、导出地址与采样器</text>
    <text x="886" y="454" class="d">Java / Node.js / Python / .NET / Go</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="88" y="568" width="670" height="270" rx="34" fill="#102038" stroke="#317E7B" stroke-width="2.5"/>
    <text x="132" y="622" class="t">V1ALPHA1 · TARGETS</text>
    <text x="132" y="686" class="n">TargetAllocator</text>
    <text x="132" y="744" class="d">给多个 Collector 分配 Prometheus 抓取目标</text>
    <text x="132" y="790" class="d">适合横向扩缩容与抓取目标均衡</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="842" y="568" width="670" height="270" rx="34" fill="#111F37" stroke="#5B59B5" stroke-width="2.5"/>
    <text x="886" y="622" class="t">V1ALPHA1 · REMOTE CONTROL</text>
    <text x="886" y="686" class="n">OpAMPBridge</text>
    <text x="886" y="744" class="d">把集群内 Collector 接到远端 OpAMP 管理端</text>
    <text x="886" y="790" class="d">适合 fleet 级集中控制</text>
  </g>

  <circle cx="758" cy="502" r="12" fill="#6CE5FF"><animate attributeName="r" values="8;14;8" dur="2.4s" repeatCount="indefinite"/></circle>
  <circle cx="842" cy="502" r="12" fill="#8B84FF"><animate attributeName="r" values="14;8;14" dur="2.4s" repeatCount="indefinite"/></circle>
  <circle cx="800" cy="462" r="2" fill="#A4C9FF">
    <animate attributeName="cy" values="442;522;442" dur="3.2s" repeatCount="indefinite"/>
  </circle>
</svg>